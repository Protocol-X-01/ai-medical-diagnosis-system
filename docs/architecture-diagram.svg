<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box { rx: 10; ry: 10; stroke-width: 2; }
      .lbl { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .sub { font-size: 12px; fill: #334155; }
      .tag { font-size: 11px; fill: #64748b; }
      .edge { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .title { font-size: 24px; font-weight: 800; fill: #0f172a; }
      .stripe { font-size: 13px; font-weight:700; fill:#fff; }
    </style>
  </defs>

  <rect width="1180" height="720" fill="#f8fafc"/>
  <text x="40" y="46" class="title">AI Medical Diagnosis — Hallucination-Resistant Clinical Decision Support</text>
  <text x="40" y="70" class="sub">Tiered cited encyclopedia (11,230) · multi-model quorum + vision · Vercel + AWS DynamoDB · NVIDIA NIM</text>

  <!-- Client -->
  <rect x="40" y="110" width="190" height="90" class="box" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="60" y="145" class="lbl">Front-desk staff · B2B</text>
  <text x="60" y="166" class="sub">De-identified case input</text>
  <text x="60" y="184" class="tag">symptoms · vitals · history · image</text>

  <!-- Vercel zone -->
  <rect x="270" y="92" width="360" height="250" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-dasharray="5 4"/>
  <rect x="270" y="92" width="360" height="26" rx="13" fill="#6366f1"/>
  <text x="284" y="110" class="stripe">▲ Vercel (serverless, region iad1)</text>

  <rect x="290" y="132" width="150" height="84" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="305" y="162" class="lbl">Next.js 16 UI</text>
  <text x="305" y="182" class="sub">App Router</text>
  <text x="305" y="199" class="tag">22 routes</text>

  <rect x="458" y="132" width="156" height="84" class="box" fill="#e0e7ff" stroke="#6366f1"/>
  <text x="473" y="162" class="lbl">/api/diagnose</text>
  <text x="473" y="182" class="sub">Route Handler</text>
  <text x="473" y="199" class="tag">Node runtime</text>

  <!-- pipeline inside vercel -->
  <rect x="290" y="232" width="324" height="92" class="box" fill="#fff" stroke="#94a3b8"/>
  <text x="305" y="256" class="lbl">Pipeline (governor-enforced)</text>
  <text x="305" y="277" class="sub">1 · ground  →  2 · quorum  →  3 · safety  →  4 · audit</text>
  <text x="305" y="297" class="tag">citation integrity: invented sources dropped;</text>
  <text x="305" y="313" class="tag">consensus with 0 verified citations is withheld</text>

  <!-- DynamoDB -->
  <rect x="690" y="110" width="200" height="110" class="box" fill="#fff7ed" stroke="#f59e0b"/>
  <text x="710" y="140" class="lbl">AWS DynamoDB</text>
  <text x="710" y="162" class="sub">MedicalConditions (11,230)</text>
  <text x="710" y="182" class="sub">Diagnoses (audit)</text>
  <text x="710" y="204" class="tag">on-demand · us-east-1</text>

  <!-- NIM quorum -->
  <rect x="690" y="250" width="450" height="240" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-dasharray="5 4"/>
  <rect x="690" y="250" width="450" height="26" rx="13" fill="#10b981"/>
  <text x="704" y="268" class="stripe">NVIDIA NIM — Multi-Model Quorum (2-of-3 consensus)</text>

  <rect x="708" y="292" width="200" height="62" class="box" fill="#d1fae5" stroke="#10b981"/>
  <text x="722" y="318" class="lbl">Nemotron-3 Super 120B</text>
  <text x="722" y="338" class="tag">reasoning voter</text>

  <rect x="922" y="292" width="200" height="62" class="box" fill="#d1fae5" stroke="#10b981"/>
  <text x="936" y="318" class="lbl">Llama 3.3 70B</text>
  <text x="936" y="338" class="tag">diagnostic voter</text>

  <rect x="708" y="366" width="200" height="62" class="box" fill="#d1fae5" stroke="#10b981"/>
  <text x="722" y="392" class="lbl">Mistral Nemotron</text>
  <text x="722" y="412" class="tag">cross-check voter</text>

  <rect x="922" y="366" width="200" height="62" class="box" fill="#fee2e2" stroke="#ef4444"/>
  <text x="936" y="392" class="lbl">Content-Safety 4B</text>
  <text x="936" y="412" class="tag">screens final output</text>

  <rect x="708" y="440" width="414" height="38" class="box" fill="#fff" stroke="#94a3b8"/>
  <text x="722" y="464" class="sub">Consensus + confidence · ambiguous → ranked options · treatments + red flags · voters cite ONLY verified ids</text>

  <!-- Governor / build-time -->
  <rect x="40" y="250" width="190" height="150" class="box" fill="#f1f5f9" stroke="#64748b"/>
  <text x="58" y="278" class="lbl">Claude Code</text>
  <text x="58" y="298" class="sub">Governor (build-time)</text>
  <text x="58" y="320" class="tag">curates sourced</text>
  <text x="58" y="336" class="tag">encyclopedia →</text>
  <text x="58" y="352" class="tag">DynamoDB; defines</text>
  <text x="58" y="368" class="tag">consensus rules.</text>
  <text x="58" y="390" class="tag">(Live voter: roadmap)</text>

  <!-- edges -->
  <path class="edge" d="M230,155 L286,160"/>
  <path class="edge" d="M440,174 L456,174"/>
  <path class="edge" d="M614,180 L688,168"/>
  <text x="624" y="158" class="tag">retrieve (read)</text>
  <path class="edge" d="M614,278 L688,300"/>
  <text x="620" y="250" class="tag">vote</text>
  <path class="edge" d="M788,220 L760,248" />
  <text x="765" y="240" class="tag">audit (write)</text>
  <path class="edge" d="M230,320 L288,290"/>
  <text x="232" y="232" class="tag">seed</text>

  <!-- footer roadmap -->
  <rect x="40" y="520" width="1100" height="150" rx="12" fill="#fff" stroke="#cbd5e1"/>
  <text x="60" y="548" class="lbl">Decision support — not a diagnosis, not a certified medical device</text>
  <text x="60" y="572" class="sub">Every assessment is grounded in cited, verified sources (NICE · ESC · IDSA/ATS · ADA · GOLD · KDIGO · WHO · AHA/ASA). Outputs that cannot be traced to a source are withheld.</text>
  <text x="60" y="600" class="sub" font-weight="700">Roadmap:</text>
  <text x="130" y="600" class="sub">Add Claude as a live quorum voter · OpenSearch vector retrieval · PHI on AWS HealthLake (HIPAA-eligible, BAA) · SOC 2 / HIPAA certification · clinical validation.</text>
  <text x="60" y="636" class="tag">Judging map → Technological Implementation: DynamoDB read+write, serverless deploy · Design: full-stack coherence · Impact: cited clinical grounding · Originality: multi-model NIM quorum with citation-integrity guarantee.</text>
  <text x="60" y="658" class="tag">Live: https://ai-medical-diagnosis-dusky.vercel.app   ·   AWS database: Amazon DynamoDB (us-east-1)</text>
</svg>
